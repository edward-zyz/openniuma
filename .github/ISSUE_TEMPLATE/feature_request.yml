name: Feature Request
description: 提议一个新功能
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: 使用场景
      description: 你想解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望行为
      description: 你希望它怎么工作？
    validations:
      required: true
  - type: dropdown
    id: willing-to-pr
    attributes:
      label: 是否愿意提交 PR？
      options:
        - "是"
        - "否"
        - "需要指导"
